- title: "Mt. Vernon 3 Mile"
  description: "From Orchard: right on Chestnut, left on Sixth, right on Mt. Vernon, left on Roosevelt, right on Horne, left on Glenwood, left on Whittier, left on Sixth, right on Central, right on Orchard back to The Brick."
  image: "/assets/images/route-mt-vernon-3mi.png"
  strava_url: "https://www.strava.com/routes/3470393654892154882"
- title: "Mt. Vernon 4 Mile"
  description: "From Orchard: right on Chestnut, left on Sixth, right on Mt. Vernon, left on Roosevelt, right on Horne, left on Glenwood. Instead of turning on Whittier, stay straight on Glenwood to Sixth. Left on Sixth, right on Central, right on Orchard back to The Brick."
  image: "/assets/images/route-mt-vernon-4mi.png"
  strava_url: "https://www.strava.com/routes/3470393007597569096"
- title: "Mt. Vernon 5 Mile"
  description: "Start the same as the 4-mile route through Glenwood and Sixth. Instead of heading directly to Central, right on Whittier, left on Washington, left on Chestnut, right on Orchard back to The Brick. (Same as Washington Reversed)"
  image: "/assets/images/route-mt-vernon-5mi.png"
  strava_url: "https://www.strava.com/routes/3470389449535007884"
