# Site settings
title: Dover Run Club
description: >-
  Tuesday nights at 6pm from The Brick in Dover, NH.
  A community of runners exploring a variety of routes — all paces welcome!
contact_email: "doverrunclub@gmail.com"
baseurl: "" # custom domain at root
url: "https://www.doverrunclub.com" # production base hostname & protocol

# Third-party integrations (set to false to disable in non-production builds)
mailchimp_enabled: true

# External links
merch_url: "https://doverrunclub.printful.me/"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO Settings
logo: /assets/images/DRC-FinalLogo.svg
social:
  name: Dover Run Club
  links:
    - https://www.facebook.com/groups/doverrunclub
    - https://www.instagram.com/doverrunclubnh/
    - https://www.strava.com/clubs/1768701

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - LICENSE

# Collections for organizing content
collections:
  events:
    output: true
    permalink: /events/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "events"
    values:
      layout: "page"
