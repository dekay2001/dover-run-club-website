<footer class="site-footer">
    <div class="container">
        <div class="footer-content">
            <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
            <p>
                {{ site.description }}
                <a href="https://www.strava.com/clubs/1768701" target="_blank" rel="noopener" aria-label="Visit our Strava Club page">Strava</a>
                ·
                <a href="https://www.facebook.com/groups/doverrunclub" target="_blank" rel="noopener" aria-label="Visit our Facebook group">Facebook Group</a>
                ·
                <a href="https://www.instagram.com/doverrunclubnh/" target="_blank" rel="noopener" aria-label="Visit our Instagram page">Instagram</a>
                ·
                <a href="mailto:{{ site.contact_email }}" aria-label="Email {{ site.title }}">Email Us</a>
                {% if site.merch_url and site.merch_url != blank %}
                ·
                <a href="{{ site.merch_url }}" target="_blank" rel="noopener" aria-label="Shop {{ site.title }} merchandise">Shop</a>
                {% endif %}
            </p>
        </div>
    </div>
</footer>
