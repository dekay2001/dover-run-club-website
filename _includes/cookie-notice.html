{% if site.mailchimp_enabled %}
<div id="cookie-notice" class="cookie-notice" role="region" aria-label="Cookie notice">
    <p>
        This site uses cookies and similar tracking technology for email marketing analytics.
        By continuing to use this site you consent to our use of cookies.
    </p>
    <button id="cookie-notice-dismiss" class="cookie-notice-btn" aria-label="Dismiss cookie notice">Got it</button>
</div>
<script>
    (function () {
        var cookieNoticeElement = document.getElementById('cookie-notice');
        var dismissButton = document.getElementById('cookie-notice-dismiss');
        if (localStorage.getItem('cookieNoticeDismissed') === 'true') {
            cookieNoticeElement.remove();
        }
        dismissButton.addEventListener('click', function () {
            localStorage.setItem('cookieNoticeDismissed', 'true');
            cookieNoticeElement.remove();
        });
    })();
</script>
{% endif %}
