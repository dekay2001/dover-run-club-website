<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/DRC-FinalLogo.svg' | relative_url }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicons/favicon-32.png' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/favicons/apple-touch-icon.png' | relative_url }}">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SportsClub",
      "name": "{{ site.title }}",
      "description": "{{ site.description }}",
      "image": "{{ '/assets/images/run-club-group-photo.jpg' | absolute_url }}",
      "url": "{{ site.url }}{{ site.baseurl }}",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "2 Washington St",
        "addressLocality": "Dover",
        "addressRegion": "NH",
        "postalCode": "03820",
        "addressCountry": "US"
      },
      "location": {
        "@type": "Place",
        "name": "The Brick"
      },
      "event": {
        "@type": "Event",
        "name": "Tuesday Night Run",
        "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
        "eventSchedule": {
          "@type": "Schedule",
          "byDay": "https://schema.org/Tuesday",
          "startTime": "18:00"
        },
        "location": {
          "@type": "Place",
          "name": "The Brick",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "2 Washington St",
            "addressLocality": "Dover",
            "addressRegion": "NH",
            "postalCode": "03820",
            "addressCountry": "US"
          }
        }
      }
    }
    </script>
    {% if site.mailchimp_enabled %}
    <script id="mcjs">!function(c,h,i,m,p){m=c.createElement(h),p=c.getElementsByTagName(h)[0],m.async=1,m.src=i,p.parentNode.insertBefore(m,p)}(document,"script","https://chimpstatic.com/mcjs-connected/js/users/3458160e76cde106ba7836b5c/48a44f420527c89c92e0b9022.js");</script>
    {% endif %}
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    {% include header.html %}
    
    <main id="main-content" class="container">
        {{ content }}
    </main>
    
    {% include footer.html %}
    {% include cookie-notice.html %}
</body>
</html>
